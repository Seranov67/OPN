# OPN Infrastructure Faucet — Nginx site config
# Place at: /etc/nginx/sites-available/faucet
# Enable:   ln -s /etc/nginx/sites-available/faucet /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx
# SSL:      certbot --nginx -d faucet.your-domain.com

upstream opn_rpc {
    server 127.0.0.1:8545;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name faucet.your-domain.com;

    # Certbot will add HTTPS redirect and SSL blocks here
    # certbot --nginx -d faucet.your-domain.com

    root /var/www/faucet;
    index index.html;

    # React SPA — serve static build
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to local OPN node RPC
    location /rpc {
        proxy_pass http://opn_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS headers for browser-based RPC calls
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

